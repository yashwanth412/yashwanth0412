      <circle cx="258" cy="260" r="142" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-dasharray="18 14" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="rotate" from="0 258 260" to="360 258 260" dur="10s" repeatCount="indefinite"/>
      </circle>
      <circle cx="258" cy="260" r="130" fill="none" stroke="#30363d" stroke-width="2"/>
      <g clip-path="url(#photoClip)">
        <image href="https://github.com/yashwanth412.png" x="130" y="132" width="256" height="256" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <circle cx="258" cy="260" r="126" fill="none" stroke="#0B1120" stroke-width="4"/>
    </g>
    <rect x="30" y="60" width="428" height="3" fill="#22D3EE" opacity="0.15">
      <animate attributeName="y" values="60;450;60" dur="3.2s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.2;0" dur="3.2s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="258" y="430" text-anchor="middle" class="key" opacity="0">&lt;yashwanth412/&gt;
    <animate attributeName="opacity" to="1" begin="1.6s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="258" y="454" text-anchor="middle" class="cc" opacity="0">root@dev-terminal: connection secure
    <animate attributeName="opacity" to="1" begin="1.75s" dur="0.01s" fill="freeze"/>
  </text>
  <g opacity="0">
    <animate attributeName="opacity" to="1" begin="1.9s" dur="0.01s" fill="freeze"/>
    <circle cx="216" cy="478" r="4" fill="#10B981">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="228" y="483" class="accent" font-size="12">status: available for freelance</text>
  </g>

